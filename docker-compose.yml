services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: GraphClerk
      APP_ENV: local
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://graphclerk:graphclerk@postgres:5432/graphclerk
      QDRANT_URL: http://qdrant:6333
      # QDRANT_API_KEY:
    # Host 8010 avoids clashing with other stacks that bind localhost:8000; container still listens on 8000.
    ports:
      - "8010:8000"
    depends_on:
      - postgres
      - qdrant

  postgres:
    image: postgres:16.13-trixie
    environment:
      POSTGRES_USER: graphclerk
      POSTGRES_PASSWORD: graphclerk
      POSTGRES_DB: graphclerk
    ports:
      - "5433:5432"
    volumes:
      - graphclerk_postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - graphclerk_qdrant_data:/qdrant/storage

volumes:
  graphclerk_postgres_data:
  graphclerk_qdrant_data:

